<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>オフライン - バラ推し</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e1b4b); color: #fff; text-align: center; padding: 24px;
      }
      .emoji { font-size: 64px; margin-bottom: 16px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #94a3b8; font-size: 14px; margin: 0 0 24px; }
      button {
        padding: 12px 24px; border: none; border-radius: 9999px; font-weight: 700;
        background: #6366f1; color: #fff; font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="emoji">📡</div>
    <h1>オフラインです</h1>
    <p>インターネット接続を確認してください</p>
    <button onclick="location.reload()">再読み込み</button>
  </body>
</html>
